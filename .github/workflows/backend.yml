name: Backend CI

on:
  push:
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

env:
  OILTRACE_TEST_DB: sqlite

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || pip install pytest pytest-asyncio httpx
          pip install web3 2>/dev/null || true

      - name: Run backend unit tests
        run: python -m pytest tests/ -v --ignore=tests/test_rls_boundaries.py
        timeout-minutes: 10

      - name: Run RLS boundary tests (if PostgreSQL available)
        if: env.OILTRACE_TEST_DB == 'postgres'
        run: python -m pytest tests/test_rls_boundaries.py -v
        timeout-minutes: 5
